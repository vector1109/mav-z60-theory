name: Z60 Canonical CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run canonical validation
        shell: pwsh
        run: |
          # Se ejecutan los scripts del núcleo y la validación
          ./Core/Z60_Core.ps1
          ./Validation/Run-CanonicalValidation.ps1

      - name: Verify validation artifacts
        shell: pwsh
        run: |
          $Artifacts = @(
            "./Validation/Figures/z60_graph_validation.csv",
            "./Validation/Figures/z60_edges.csv",
            "./Validation/Figures/z60_basins.csv",
            "./Validation/Figures/z60_graph_validation.md"
          )

          foreach ($File in $Artifacts) {
            if (!(Test-Path $File)) {
              throw "Missing artifact: $File"
            }
            Write-Host "[OK] $File"
          }

      - name: Verify canonical idempotents
        shell: pwsh
        run: |
          # Definición de idempotentes del sistema Z60
          $ExpectedRegex = "0, 1, 16, 21, 25, 36, 40, 45"
          $Content = Get-Content "./Validation/Figures/z60_graph_validation.md" -Raw

          if ($Content -notmatch $ExpectedRegex) {
            throw "Canonical idempotents mismatch in validation summary"
          }
          Write-Host "[OK] Canonical idempotents verified: $ExpectedRegex"

      - name: Verify VERSION
        shell: pwsh
        run: |
          if (!(Test-Path "./VERSION.txt")) {
            throw "VERSION.txt missing"
          }
          $Version = Get-Content "./VERSION.txt" -Raw
          if ([string]::IsNullOrWhiteSpace($Version)) {
            throw "VERSION.txt is empty"
          }
          Write-Host "[OK] VERSION = $($Version.Trim())"

      - name: Verify freeze specifications
        shell: pwsh
        run: |
          $Specs = @(
            "./Z60/spec/FREEZE.md",
            "./Z60/spec/SEMVER_CONTRACT.md"
          )

          foreach ($Spec in $Specs) {
            if (!(Test-Path $Spec)) {
              throw "Missing specification: $Spec"
            }
            Write-Host "[OK] $Spec"
          }

      - name: CI completed
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "-------------------------------------------"
          Write-Host "[SYSTEM STATUS] CANONICAL VALIDATION PASSED"
          Write-Host "-------------------------------------------"